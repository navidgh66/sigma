<!doctype html>
<!--
  sigma deck template (reveal.js, single file).
  Placeholders: {{TITLE}} {{SIGMA_MARKDOWN}} {{SPEAKER_NOTES}} {{CITATIONS}}
                {{STAGE}} {{DATE}} {{SLUG}}
  Theme vars come from THEMES.md. CDN by default; for offline, inline the three
  reveal.js <link>/<script> sources and replace the Google Fonts link.
  PDF: open this file with ?print-pdf appended, then browser Print.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — sigma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css" id="base-theme">
  <style>
    :root{
      --accent: oklch(62% 0.19 256);
      --ink:    oklch(22% 0 0);
      --surface:oklch(99% 0 0);
      --muted:  oklch(55% 0 0);
    }
    .reveal{font-family:"Space Grotesk", system-ui, sans-serif; color:var(--ink);}
    .reveal .slides section{text-align:left;}
    .reveal h1,.reveal h2,.reveal h3{letter-spacing:-0.02em; color:var(--ink);}
    .reveal h1{font-size:2.4em;}
    .reveal a{color:var(--accent);}
    .reveal .sources{font-size:0.5em; color:var(--muted); line-height:1.5;}
    .reveal .lede{font-family:"Source Serif 4", Georgia, serif; color:var(--muted);}
    .reveal .tag{display:inline-block; padding:.1em .5em; border-radius:.4em;
                 background:color-mix(in oklch, var(--accent) 18%, transparent);
                 color:var(--accent); font-size:.5em; font-weight:700;}
    .reveal .provenance{position:fixed; bottom:.6em; left:.8em; font-size:.45em;
                        color:var(--muted); opacity:.7; z-index:30;}
    .reveal .inference{font-style:italic; color:var(--muted);}
    @media (prefers-reduced-motion: reduce){
      .reveal .fragment{transition:none !important;}
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <!-- Slides parsed from sigma markdown: '---' splits horizontal, '--' vertical. -->
      <section data-markdown data-separator="^\n---\n$" data-separator-vertical="^\n--\n$">
        <textarea data-template>
{{SIGMA_MARKDOWN}}

Note:
{{SPEAKER_NOTES}}
        </textarea>
      </section>

      <!-- Sources / citations end slide -->
      <section>
        <h2>Sources</h2>
        <ul class="sources">
{{CITATIONS}}
        </ul>
      </section>
    </div>
  </div>

  <div class="provenance">Generated by sigma · {{STAGE}} · {{DATE}} · source: {{SLUG}}</div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/monokai.css">
  <script>
    Reveal.initialize({
      plugins: [RevealMarkdown, RevealNotes, RevealHighlight],
      hash: true,
      transition: 'fade',
      controls: true,
      progress: true,
      slideNumber: 'c/t',
      showNotes: false
    });
  </script>
</body>
</html>
