<!doctype html>
<!--
  sigma report template (framework-free long-scroll page, single file).
  Placeholders: {{TITLE}} {{LEDE}} {{SECTIONS}} {{CITATIONS}}
                {{STAGE}} {{DATE}} {{SLUG}}
  {{SECTIONS}} = a sequence of <section class="reveal-on-scroll">…</section>.
  Scroll-driven entrance via CSS animation-timeline: view(), with an
  IntersectionObserver fallback for engines that lack it (e.g. Firefox).
  PDF: browser Print (the @media print block forces full opacity, no motion).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — sigma report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap">
  <style>
    :root{
      --accent: oklch(62% 0.19 256);
      --ink:    oklch(20% 0 0);
      --surface:oklch(99% 0 0);
      --muted:  oklch(48% 0 0);
      --rule:   oklch(90% 0 0);
      --space:  clamp(3rem, 2rem + 5vw, 8rem);
      --measure: 72ch;
    }
    *{box-sizing:border-box;}
    body{margin:0; background:var(--surface); color:var(--ink);
         font-family:"Source Serif 4", Georgia, serif; line-height:1.65;
         font-size:clamp(1rem, 0.95rem + 0.3vw, 1.15rem);}
    header.hero{max-width:var(--measure); margin:0 auto; padding:var(--space) 1.5rem 0;}
    header.hero h1{font-family:"Space Grotesk", system-ui, sans-serif;
                   font-size:clamp(2.4rem, 1.5rem + 4vw, 4.5rem); line-height:1.05;
                   letter-spacing:-0.03em; margin:0 0 .4em;}
    .lede{color:var(--muted); font-size:1.2em;}
    main{max-width:var(--measure); margin:0 auto; padding:0 1.5rem;}
    section{padding-block:var(--space); border-top:1px solid var(--rule);}
    section:first-child{border-top:none;}
    h2{font-family:"Space Grotesk", system-ui, sans-serif; font-size:1.8rem;
       letter-spacing:-0.02em; margin:0 0 .6em;}
    a{color:var(--accent);}
    .callout{border-left:3px solid var(--accent); padding:.4rem 0 .4rem 1rem;
             margin:1.2rem 0; background:color-mix(in oklch, var(--accent) 6%, transparent);}
    .inference{color:var(--muted); font-style:italic;}
    .tag{display:inline-block; padding:.1em .55em; border-radius:.4em; font-size:.75rem;
         font-weight:700; font-family:"Space Grotesk", sans-serif;
         background:color-mix(in oklch, var(--accent) 16%, transparent); color:var(--accent);}
    footer{max-width:var(--measure); margin:0 auto; padding:var(--space) 1.5rem;
           color:var(--muted); font-size:.85rem; border-top:1px solid var(--rule);}

    /* Scroll-driven entrance. NOTE: animation-timeline declared AFTER animation. */
    .reveal-on-scroll{
      animation: rise both;
      animation-timeline: view();
      animation-range: entry 0% cover 30%;
    }
    @keyframes rise{
      from{opacity:0; transform:translateY(24px);}
      to{opacity:1; transform:none;}
    }
    @media (prefers-reduced-motion: reduce){
      *{animation-timeline:auto !important; animation-duration:.01ms !important;}
    }
    @media print{
      .reveal-on-scroll{opacity:1 !important; transform:none !important; animation:none !important;}
      section{border-top:none;}
    }
  </style>
</head>
<body>
  <header class="hero reveal-on-scroll">
    <h1>{{TITLE}}</h1>
    <p class="lede">{{LEDE}}</p>
  </header>

  <main>
{{SECTIONS}}
    <section class="reveal-on-scroll">
      <h2>Sources</h2>
      <ol>
{{CITATIONS}}
      </ol>
    </section>
  </main>

  <footer>Generated by sigma · {{STAGE}} · {{DATE}} · source: {{SLUG}}</footer>

  <!-- Charts (optional): uncomment and add <canvas> in a section.
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  -->
  <script>
    // Fallback for engines without scroll-driven animations (e.g. Firefox).
    if (!CSS.supports('animation-timeline: view()')) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.style.opacity = 1;
            e.target.style.transform = 'none';
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.15 });
      document.querySelectorAll('.reveal-on-scroll').forEach(function (el) {
        el.style.opacity = 0;
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity .6s ease, transform .6s ease';
        io.observe(el);
      });
    }
  </script>
</body>
</html>
