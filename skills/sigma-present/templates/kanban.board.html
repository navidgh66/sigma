<!doctype html>
<!--
  sigma kanban snapshot template (single file).
  Placeholders: {{TITLE}} {{COLUMNS}} {{CHART_DATA}} {{STAGE}} {{DATE}} {{SLUG}}
  {{COLUMNS}} = a sequence of:
    <div class="col"><h2>Name <span class="count">N</span></h2>
      <article class="card" data-status="todo|wip|blocked|done">
        <span class="id">T1</span><p>title</p><span class="domain">nlp</span>
      </article> … </div>
  PDF: browser Print.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — sigma board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap">
  <style>
    :root{
      --accent: oklch(62% 0.19 256);
      --ink:    oklch(20% 0 0);
      --surface:oklch(97% 0.01 250);
      --card:   oklch(100% 0 0);
      --muted:  oklch(50% 0 0);
      --todo:   oklch(60% 0 0);
      --wip:    oklch(75% 0.15 85);
      --blocked:oklch(60% 0.2 25);
      --done:   oklch(62% 0.17 150);
    }
    *{box-sizing:border-box;}
    body{margin:0; background:var(--surface); color:var(--ink);
         font-family:"Space Grotesk", system-ui, sans-serif; padding:2rem;}
    header{display:flex; justify-content:space-between; align-items:baseline;
           flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;}
    h1{font-size:2rem; letter-spacing:-0.02em; margin:0;}
    .board{display:grid; grid-template-columns:repeat(4, 1fr); gap:1rem; align-items:start;}
    .col{background:color-mix(in oklch, var(--card) 70%, transparent);
         border-radius:.9rem; padding:.85rem; min-height:6rem;}
    .col h2{font-size:.95rem; text-transform:uppercase; letter-spacing:.06em;
            margin:0 0 .75rem; display:flex; justify-content:space-between; color:var(--muted);}
    .count{background:color-mix(in oklch, var(--accent) 16%, transparent);
           color:var(--accent); border-radius:1em; padding:0 .55em; font-size:.85em;}
    .card{background:var(--card); border-radius:.6rem; padding:.65rem .7rem; margin-bottom:.6rem;
          box-shadow:0 1px 2px oklch(0% 0 0 / .06), 0 4px 12px oklch(0% 0 0 / .04);
          border-left:3px solid var(--todo); transition:transform .15s ease, box-shadow .15s ease;}
    .card:hover{transform:translateY(-2px); box-shadow:0 2px 4px oklch(0% 0 0 / .08), 0 8px 20px oklch(0% 0 0 / .08);}
    .card[data-status="wip"]{border-left-color:var(--wip);}
    .card[data-status="blocked"]{border-left-color:var(--blocked);}
    .card[data-status="done"]{border-left-color:var(--done); opacity:.78;}
    .card .id{font-size:.7rem; font-weight:700; color:var(--accent);}
    .card p{margin:.2rem 0 .35rem; font-size:.9rem; line-height:1.3;}
    .card .domain{font-size:.7rem; color:var(--muted);}
    .chart-wrap{max-width:340px; margin-top:2rem;}
    footer{margin-top:2rem; color:var(--muted); font-size:.8rem;}
    @media (max-width:760px){.board{grid-template-columns:1fr 1fr;}}
    @media (prefers-reduced-motion: reduce){.card{transition:none;}}
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <span style="color:var(--muted)">sigma board · {{DATE}}</span>
  </header>

  <div class="board">
{{COLUMNS}}
  </div>

  <div class="chart-wrap"><canvas id="counts"></canvas></div>

  <footer>Generated by sigma · {{STAGE}} · {{DATE}} · source: {{SLUG}}</footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    // {{CHART_DATA}} = {labels:[...], data:[...]}
    var CHART_DATA = {{CHART_DATA}};
    if (window.Chart && CHART_DATA && CHART_DATA.labels) {
      new Chart(document.getElementById('counts'), {
        type: 'doughnut',
        data: {
          labels: CHART_DATA.labels,
          datasets: [{
            data: CHART_DATA.data,
            backgroundColor: ['#8a8a8a', '#d6a531', '#d24a3a', '#3aa564']
          }]
        },
        options: { plugins: { legend: { position: 'bottom' } } }
      });
    }
  </script>
</body>
</html>
