# sigma — per-project configuration
# Generated by `sigma init`. Commit this; keep machine-specific bits in
# sigma.config.local.yml (gitignored).

profile:
  name: my-project
  harness: claude-code

# Which research models to use by default (skipped gracefully if CLI missing).
research:
  models: [claude, gemini, gpt]

# Domains to load for this project. Trim to what the project actually needs
# to keep context lean.
domains:
  - classic-ml
  - deep-learning
  - nlp
  - rl
  - data-analysis
  - data-engineering
  - ai-agent-engineering
  - mlops
  - llm-engineering

# Pipeline commands enabled for this project.
commands:
  - /research
  - /propose
  - /blueprint
  - /spec
  - /tasks
  - /implement-task
  - /verify
  - /loop

# Loop guardrails.
loop:
  max_cycles: 20
  worktrees: true
  maker_checker_separation: true
