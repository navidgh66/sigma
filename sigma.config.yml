# sigma project config. Safe to commit — structural only.
# NEVER put secrets here. API keys live in ~/.sigma/.env (chmod 600, git-ignored).
# Machine-specific overrides go in sigma.config.local.yml (also git-ignored).
profile:
  name: my-project
  harness: claude-code
research:
  models:
  - claude
  - gemini
  - gpt
domains:
- classic-ml
- deep-learning
- nlp
- rl
- data-analysis
- data-engineering
- ai-agent-engineering
- mlops
- llm-engineering
commands:
- /research
- /propose
- /blueprint
- /spec
- /tasks
- /implement-task
- /verify
- /loop
loop:
  max_cycles: 20
  worktrees: true
  maker_checker_separation: true
